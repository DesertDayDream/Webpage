  ctx.textAlign = 'center';

  ctx.fillStyle = '#f0e040';
  ctx.font = '36px VT323, monospace';
  ctx.fillText('NEW HIGH SCORE!', CW/2, CH/2 - 120);

  ctx.fillStyle = '#c8a840';
  ctx.font = '26px VT323, monospace';
  ctx.fillText('SCORE:  ' + pendingScore, CW/2, CH/2 - 80);

  ctx.fillStyle = '#8a88a0';
  ctx.font = '16px VT323, monospace';
  ctx.fillText('ENTER YOUR INITIALS', CW/2, CH/2 - 44);

  // Three letter boxes, arcade-style
  const boxW = 46, boxH = 56, gap = 16;
  const startX = CW/2 - (boxW*3 + gap*2)/2;
  const boxY = CH/2 - 20;
  for (let i = 0; i < 3; i++) {
    const bx = startX + i*(boxW+gap);
    const active = i === initialsCursor;
    ctx.fillStyle = active ? 'rgba(62,248,62,0.15)' : 'rgba(255,255,255,0.05)';
    ctx.fillRect(bx, boxY, boxW, boxH);
    ctx.strokeStyle = active ? '#3ef83e' : '#3a384e';
    ctx.lineWidth = active ? 2 : 1;
    ctx.strokeRect(bx, boxY, boxW, boxH);
    ctx.fillStyle = active ? '#3ef83e' : '#e0e0f0';
    ctx.font = '40px VT323, monospace';
    ctx.fillText(initials[i], bx + boxW/2, boxY + boxH - 14);
  }

  ctx.fillStyle = '#5a5870';
  ctx.font = '14px VT323, monospace';
  ctx.fillText('TYPE LETTERS  OR  ↑ / ↓ TO CHANGE   ← / → TO MOVE', CW/2, boxY + boxH + 34);

  const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 400);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#3ef83e';
  ctx.font = '20px VT323, monospace';
  ctx.fillText('ENTER — SAVE SCORE        ESC — SKIP', CW/2, boxY + boxH + 68);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawLeaderboardScreen(ctx) {
  ctx.fillStyle = 'rgba(0,0,0,0.92)';
  ctx.fillRect(0,0,CW,CH);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#f0c840';
  ctx.font = '44px VT323, monospace';
  ctx.fillText('LEADERBOARD', CW/2, 76);

  const lb = leaderboardEntries.length ? leaderboardEntries : loadLeaderboard();
  const colRank = CW/2 - 170, colInitials = CW/2 - 100, colScore = CW/2 + 170;
  const startY = 130, rowH = 34;

  if (lb.length === 0) {
    ctx.fillStyle = '#5a5870';
    ctx.font = '18px VT323, monospace';
    ctx.fillText('NO SCORES YET', CW/2, startY + 20);
  }

  lb.forEach((entry, i) => {
    const y = startY + i * rowH;
    const isNew = i === justSavedIndex;
    ctx.font = (isNew ? 'bold ' : '') + '22px VT323, monospace';
    ctx.fillStyle = isNew ? '#3ef83e' : (i === 0 ? '#f0e040' : '#c8c6e0');
    ctx.textAlign = 'left';
    ctx.fillText((i+1) + '.', colRank, y);
    ctx.fillText(entry.initials, colInitials, y);
    ctx.textAlign = 'right';
    ctx.fillText(entry.score.toString().padStart(8,'0'), colScore, y);
  });
  ctx.textAlign = 'center';

  const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 400);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#3ef83e';
  ctx.font = '22px VT323, monospace';
  ctx.fillText('CLICK OR ENTER — PLAY AGAIN        ESC — BACK', CW/2, CH - 30);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// === SCORING & TIMER ===

function updateTimers(dt) {
  if (STATE !== 'playing' && STATE !== 'mpPlaying') return;
  // Non-host MP clients don't run the authoritative timer/spawn logic at all —
  // they just receive mainTimer/elapsed via the host's periodic broadcast.
  if (STATE === 'mpPlaying' && !isHost) return;

  mainTimer -= dt;
  elapsed   += dt;
  if (mainTimer <= 0) {
    mainTimer = 0;
    if (STATE === 'mpPlaying') endMultiplayerMatch(); else endGame();
    return;
  }

  if (STATE === 'mpPlaying') {
    // Shared team combo timer — host-authoritative, decays the same way the
    // single-player combo does, just broadcast to everyone else instead of
    // being purely local.
    if (mpComboTimer > 0) {
      mpComboTimer -= dt * 1000;
      if (mpComboTimer <= 0) { mpCombo = 0; mpComboTimer = 0; }
    }
    if (comboMilestoneTimer > 0) comboMilestoneTimer -= dt * 1000;
  } else {
    comboTimer -= dt * 1000;
    if (comboTimer <= 0 && combo > 0) {
      combo = 0;
      comboTimer = 0;
    }
    if (comboMilestoneTimer > 0) comboMilestoneTimer -= dt * 1000;
  }

  // Spawn rate ramps up
  spawnRate = Math.max(1.2, 3.0 - elapsed / 50);
  spawnTimer += dt;
  const waveSize = 1 + Math.floor(elapsed / 40);
  if (spawnTimer >= spawnRate) {
    spawnTimer = 0;
    for (let i = 0; i < waveSize; i++) spawnEnemy();
  }
}

function endGame() {
  if (score > highScore) {
    highScore = score;
    localStorage.setItem(HS_KEY, highScore);
  }
  pendingScore = score;
  if (qualifiesForLeaderboard(score)) {
    STATE = 'enterInitials';
    initials = ['A','A','A'];
    initialsCursor = 0;
  } else {
    STATE = 'dead';
  }
}

// Shared player/world reset used by both single-player and multiplayer match
// starts — loadout, position, camera snap, ammo, timers, and clearing the
// enemy/bullet/pickup/particle/flash arrays.
function resetPlayerForMatch() {
  // Reset to the devtool-configured loadout — undoes any weapon pickups from a previous run.
  Object.assign(EQUIPPED_RANGED, resolveEquippedWeapon('ranged'));
  Object.assign(EQUIPPED_MELEE, resolveEquippedWeapon('melee'));
  player.x = MAP_CONFIG.playerStart.x; player.y = MAP_CONFIG.playerStart.y;
  // Snap the camera straight to the player instead of panning in from (0,0) —
  // matters once maps are bigger than one screen.
  camera.x = Math.max(0, Math.min(MAP_W - CW, player.x - CW/2));
  camera.y = Math.max(0, Math.min(MAP_H - CH, player.y - CH/2));
  player.hp = CONFIG.PLAYER.hp; player.maxHp = CONFIG.PLAYER.hp;
  player.mag = Math.min(EQUIPPED_RANGED.magSize, EQUIPPED_RANGED.ammo);
  player.reserve = EQUIPPED_RANGED.ammo - player.mag;
  player.reloading = false; player.reloadTimer = 0;
  player.rawAngle = 0; player.facing = 'S'; player.meleeCd = 0; player.fireCd = 0;
  player.flashTimer = 0; player.invincible = 0;
  enemies = []; bullets = []; pickups = []; particles = []; flashes = [];
  mainTimer = 150; elapsed = 0;
  spawnTimer = 0; spawnRate = 3.0;
}

function startGame() {
  STATE = 'playing';
  resetPlayerForMatch();
  score = 0; combo = 0; comboTimer = 0; comboMilestone = ''; comboMilestoneTimer = 0;
  peakCombo = 0;
  justSavedIndex = -1;
}

// === GAME LOOP ===

const ctx = canvas.getContext('2d');
let lastTime = 0;

function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  uiButtons = []; // repopulated by whichever menu screen draws this frame

  SPRITES.updateAnims(dt);

  const mpActive = STATE === 'mpPlaying';
  if (STATE === 'playing' || mpActive) {
    updateTimers(dt);
    updatePlayer(dt);
    updateEnemies(dt);
    updateBullets(dt);
    updatePickups(dt);
    updateParticles(dt);
    updateFlashes(dt);
    if (mpActive) {
      updateRemotePlayers(dt);
      updateMultiplayerNet(dt);
    }
  }

  // Render — world-space (camera transform)
  const frozenOverlay = STATE === 'dead' || STATE === 'enterInitials' || STATE === 'leaderboard' || STATE === 'mpEnded';
  ctx.save();
  ctx.translate(-Math.round(camera.x), -Math.round(camera.y));
  drawMap(ctx);
  if (STATE === 'playing' || mpActive || frozenOverlay) {
    drawPickups(ctx);
    drawBullets(ctx);
    drawEnemies(ctx);
    if (mpActive) drawRemotePlayers(ctx);
    drawPlayer(ctx);
    drawParticles(ctx);
    drawFlashes(ctx);
  }
  ctx.restore();

  // Screen-space (HUD + overlays)
  if (STATE === 'playing' || frozenOverlay) drawHUD(ctx);
  if (mpActive) drawMpHUD(ctx);
  if (STATE === 'start')         drawStartScreen(ctx);
  if (STATE === 'dead')          drawDeadScreen(ctx);
  if (STATE === 'enterInitials') drawInitialsScreen(ctx);
  if (STATE === 'leaderboard')   drawLeaderboardScreen(ctx);
  if (STATE === 'settings')      drawSettingsScreen(ctx);
  if (STATE === 'mpConnect')     drawMpConnectScreen(ctx);
  if (STATE === 'mpName')        drawMpNameScreen(ctx);
  if (STATE === 'mpBrowse')      drawMpBrowseScreen(ctx);
  if (STATE === 'mpLobby')       drawMpLobbyScreen(ctx);
  if (STATE === 'mpEnded')       drawMpEndedScreen(ctx);
}

// === INIT ===

SPRITES.load();

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const cx = (e.clientX - r.left) * (CW / r.width);
  const cy = (e.clientY - r.top)  * (CH / r.height);
  const hit = uiButtons.find(b => cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h);
  if (hit) { hit.action(); return; }
  if (STATE === 'dead' || STATE === 'leaderboard') startGame();
});
window.addEventListener('keydown', e => {
  if (TextEntry.active) { TextEntry.handleKey(e); return; }
  if (STATE === 'enterInitials') { handleInitialsKey(e); return; }
  if (STATE === 'leaderboard') {
    if (e.key === 'Enter') startGame();
    else if (e.key === 'Escape') STATE = 'start';
    return;
  }
  if ((STATE === 'start' || STATE === 'dead') && e.key.toLowerCase() === 'l') {
    leaderboardEntries = loadLeaderboard();
    justSavedIndex = -1;
    STATE = 'leaderboard';
    return;
  }
  if (e.key === 'Enter' && (STATE === 'start' || STATE === 'dead')) startGame();
  if (e.key === 'Escape' && STATE === 'mpBrowse') { Net.close(); STATE = 'start'; }
  if (e.key === 'Escape' && STATE === 'mpLobby') {
    Net.send('leave');
    mpCurrentLobby = null;
    STATE = 'mpBrowse';
    Net.send('list');
  }
  if (e.key === 'Escape' && STATE === 'settings') STATE = 'start';
  if (e.key === 'Escape' && STATE === 'mpConnect' && mpConnectError) STATE = 'start';
});

requestAnimationFrame(loop);

})();
</script>
